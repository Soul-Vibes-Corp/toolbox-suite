<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>11B GARRISON SIM</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
    <div class="scanlines"></div>

    <div id="login-screen">
        <div class="terminal-box">
            <h2 class="flicker">SECURE TERMINAL LOGIN</h2>
            <input type="email" id="email" placeholder="ENLISTED EMAIL">
            <input type="password" id="password" placeholder="PASSWORD">
            <button onclick="handleLogin()" class="btn-tactical">AUTHENTICATE</button>
        </div>
    </div>

    <div id="game-container" class="hidden">
        <div id="ui-layer">
            <div class="hud-header">
                <div class="stat-box">RANK: <span id="rank-val">PVT</span></div>
                <div class="stat-box">STAMINA: <div class="bar-bg"><div id="stamina-fill"></div></div></div>
                <div class="stat-box">XP: <span id="xp-val">0</span></div>
            </div>
            
            <div class="inventory-bar">
                <div class="inv-slot" title="Primary Weapon">M4A1</div>
                <div class="inv-slot" title="Armor">IOTV</div>
            </div>

            <button onclick="reportForFormation()" class="btn-formation">REPORT FOR FORMATION</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>

    <div id="garrison-hud">
    <div class="scanlines"></div>
    <header>
        <h2 class="flicker">SITREP: GARRISON</h2>
        <div id="stats-bar">STAMINA: <span id="stamina-val">100</span>%</div>
    </header>
    
    <main class="viewport">
        <button onclick="reportForFormation()" class="btn-tactical">REPORT FOR FORMATION</button>
    </main>
</div>


<div id="inventory-screen" class="hud-overlay">
    <h3>EQUIPMENT LOCKER</h3>
    <div class="inventory-grid">
        <div class="slot" id="slot-primary">
            <span class="label">WEAPON</span>
            <div class="icon m4-carbine"></div>
        </div>
        <div class="slot" id="slot-uniform">
            <span class="label">UNIFORM</span>
            <div class="icon ocp-pattern"></div>
        </div>
    </div>
</div>


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>11B Life Sim | Tactical Web</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
    <div id="login-screen">
        <div class="terminal-box">
            <h1>AUTHENTICATE SOLDIER</h1>
            <input type="email" id="email" placeholder="CAC-ID (Email)">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleLogin()" class="btn-tactical">SECURE LOGIN</button>
        </div>
    </div>

    <div id="game-container" class="hidden">
        <div id="ui-layer">
            <div class="hud-top">
                <div id="rank-display">PVT. DOE</div>
                <div id="stamina-bar"><div id="stamina-fill"></div></div>
            </div>
            <button id="formation-btn" class="btn-tactical">REPORT FOR FORMATION</button>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="game.js"></script>
</body>


</html>
