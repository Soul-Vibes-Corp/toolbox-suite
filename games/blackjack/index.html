<div id="garrison-hud">
    <div class="scanlines"></div>
    <header>
        <h2 class="flicker">SITREP: GARRISON</h2>
        <div id="stats-bar">STAMINA: <span id="stamina-val">100</span>%</div>
    </header>
    
    <main class="viewport">
        <button onclick="reportForFormation()" class="btn-tactical">REPORT FOR FORMATION</button>
    </main>
</div>


<div id="inventory-screen" class="hud-overlay">
    <h3>EQUIPMENT LOCKER</h3>
    <div class="inventory-grid">
        <div class="slot" id="slot-primary">
            <span class="label">WEAPON</span>
            <div class="icon m4-carbine"></div>
        </div>
        <div class="slot" id="slot-uniform">
            <span class="label">UNIFORM</span>
            <div class="icon ocp-pattern"></div>
        </div>
    </div>
</div>
