<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
    <div class="scanlines"></div>
    <div id="login-screen">
        <div class="terminal-box">
            <h2>COMMAND LOGIN</h2>
            <input type="email" id="email" placeholder="EMAIL">
            <input type="password" id="password" placeholder="PASSWORD">
            <button onclick="handleLogin()" class="btn-tactical">AUTHENTICATE</button>
        </div>
    </div>
    <div id="game-container" class="hidden">
        <div class="hud-overlay">
            <div>RANK: <span id="rank-val">PVT</span> | XP: <span id="xp-val">0</span></div>
            <div class="stamina-container"><div id="stamina-fill"></div></div>
        </div>
        <div class="interaction-menu">
            <button onclick="window.startRuck()" class="btn-tactical">START RUCK</button>
        </div>
    </div>
    <script src="auth.js"></script>
    <script src="main.js"></script>
</body>
</html>
